<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <title>Avtoto Bot Forms</title>
  </head>
  <body style="margin:0; background:#fff;">
    <script>
      (function () {
        try {
          var s = new URLSearchParams(window.location.search);
          var h = new URLSearchParams(window.location.hash.replace(/^#/, ''));
          var hasAnyPayload =
            s.get('formType') || h.get('formType') ||
            s.get('WebAppStartParam') || h.get('WebAppStartParam') ||
            s.get('start_param') || h.get('start_param');
          if (!hasAnyPayload) {
            document.documentElement.style.background = 'transparent';
            document.body.style.background = 'transparent';
            var st = document.createElement('style');
            st.textContent = '#preloader{display:none !important}#root{background:transparent !important}';
            document.head.appendChild(st);
          }
        } catch (e) {}
      })();
    </script>
    <div id="root">
      <div id="preloader" style="display:flex;justify-content:center;align-items:center;min-height:100vh;">
        <div style="width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#1976d2;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
